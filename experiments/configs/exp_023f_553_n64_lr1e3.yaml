# EXP-023f：5×5×3，obs_channels=3，n_envs=64，LR=1e-3
# 核心变量（vs 023d）：learning_rate 3e-4→1e-3
# 目的：测试更大 LR 能否进一步加速收敛（vs 023d 的 74% max @ 500K）
# Phase 1：500K steps 趋势扫描

model_hyperparams:
  learning_rate: 0.001
  ent_coef: 0.01
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 1.0
  n_steps: 512
  batch_size: 128
  n_epochs: 4

network_architecture:
  features_dim: 128
  pi_layers: [64, 64]
  vf_layers: [64, 64]

environment_config:
  width: 5
  height: 5
  n_mines: 3
  reward_win: 0.1
  reward_lose: -0.1
  reward_reveal: 0.1
  reward_invalid: -0.1
  obs_channels: 3

training_execution:
  total_timesteps: 500_000
  n_envs: 64
  vec_env_type: "subproc"
  checkpoint_freq: 25000
  device: "cuda"
  seed: 42

paths_config:
  experiment_base_dir: "./training_runs"
  model_prefix: "mw_ppo"
