# EXP-023h：5×5×3 新基线完整训练，obs_channels=3，n_envs=64，LR=1e-3
# 基于 Phase 1 扫描结论：023f（n_envs=64, LR=1e-3）在 500K 步达到 84% max / 81% final
# 目的：完整 2M steps 训练，建立新 5×5×3 基线（预期大幅超越 EXP-018 的 85.6%@2M）
# 预期：500K 内达 80%+，2M 步时接近或超过 90%

model_hyperparams:
  learning_rate: 0.001
  ent_coef: 0.01
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 1.0
  n_steps: 512
  batch_size: 128
  n_epochs: 4

network_architecture:
  features_dim: 128
  pi_layers: [64, 64]
  vf_layers: [64, 64]

environment_config:
  width: 5
  height: 5
  n_mines: 3
  reward_win: 0.1
  reward_lose: -0.1
  reward_reveal: 0.1
  reward_invalid: -0.1
  obs_channels: 3

training_execution:
  total_timesteps: 2_000_000
  n_envs: 64
  vec_env_type: "subproc"
  checkpoint_freq: 50000
  device: "cuda"
  seed: 42

paths_config:
  experiment_base_dir: "./training_runs"
  model_prefix: "mw_ppo"
