# EXP-014 学习率 Cosine 衰减（B1）
# 核心思路：lr_start=0.0001 cosine 衰减到 lr_end=0.00001（1/10），改善后期收敛
# 唯一变量（vs EXP-009）：lr_schedule=cosine, lr_end=0.00001
# 对比基准：EXP-009（8×8×10 from scratch 5M = 0%）

model_hyperparams:
  learning_rate: 0.0001
  lr_schedule: "cosine"
  lr_end: 0.00001
  ent_coef: 0.01
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 1.0
  n_steps: 1024
  batch_size: 128
  n_epochs: 8

network_architecture:
  features_dim: 128
  pi_layers: [64, 64]
  vf_layers: [64, 64]

environment_config:
  width: 8
  height: 8
  n_mines: 10
  reward_win: 1.0
  reward_lose: -1.0
  reward_reveal: 0.1
  reward_invalid: -0.1
  obs_channels: 2

training_execution:
  total_timesteps: 5_000_000
  n_envs: 16
  vec_env_type: "subproc"
  checkpoint_freq: 100000
  device: "cuda"
  seed: 42

paths_config:
  experiment_base_dir: "./training_runs"
  model_prefix: "mw_ppo"
