# EXP-011 Stage 2：6×6×5 中间棋盘，2M 步（分阶段课程学习）
# transfer_from: EXP-007 @1.75M (mw_ppo_5x5x3_seed42_20260317041904, step 1750000)
# 目标：6×6×5 中间台阶，从 5×5×3（87%）迁移 Conv 权重，建立 6×6 策略供 Stage 3 迁移
# 唯一变量（vs EXP-007）：棋盘 5×5×3 → 6×6×5 + Conv 权重迁移（不续训，重新计数步数）
# 对比基准：EXP-007（5×5×3 @1.75M = 87%），EXP-009/010（8×8×10 from scratch/transfer = 0%）
# 成功标准：eval_win_rate > 50%（6×6×5 密度 14%，随机完成率 ~40%，低于 50% 说明有问题）

model_hyperparams:
  learning_rate: 0.0001
  ent_coef: 0.01
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coef: 1.0
  n_steps: 1024
  batch_size: 128
  n_epochs: 8

network_architecture:
  features_dim: 128
  pi_layers: [64, 64]
  vf_layers: [64, 64]

environment_config:
  width: 6
  height: 6
  n_mines: 5
  reward_win: 1.0
  reward_lose: -1.0
  reward_reveal: 0.1
  reward_invalid: -0.1
  obs_channels: 2

training_execution:
  total_timesteps: 2_000_000
  n_envs: 16
  vec_env_type: "subproc"
  checkpoint_freq: 50000
  device: "cuda"
  seed: 42

paths_config:
  experiment_base_dir: "./training_runs"
  model_prefix: "mw_ppo"
